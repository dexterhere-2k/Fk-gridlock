name: deploy-azure

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'
      environment:
        description: 'Deployment environment'
        required: false
        default: 'prod'
        type: choice
        options: ['dev', 'staging', 'prod']

env:
  APP_NAME: gridlock
  IMAGE_TAG: ${{ github.sha }}
  MAPPLS_REST_KEY: ${{ secrets.MAPPLS_REST_KEY }}
  MAPPLS_CLIENT_ID: ${{ secrets.MAPPLS_CLIENT_ID }}
  MAPPLS_CLIENT_SECRET: ${{ secrets.MAPPLS_CLIENT_SECRET }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ======================================================================
      # Azure login via OIDC (federated credential on the Entra ID app).
      # ======================================================================
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ======================================================================
      # Validate Bicep template compiles before deploying
      # ======================================================================
      - name: Validate Bicep template
        run: |
          az bicep build --file infra/main.bicep --stdout > /dev/null
          echo "Bicep compilation succeeded"

      # ======================================================================
      # Deploy Bicep infra - Phase 1: Deploy ACR & Shared Infra (without Container App)
      # ======================================================================
      - name: Deploy ACR & Shared Infrastructure
        id: infra-pre
        run: |
          set -euo pipefail

          az deployment sub create \
            --name "gridlock-ci-pre-${GITHUB_RUN_ID}" \
            --location centralindia \
            --template-file infra/main.bicep \
            --parameters \
              appName="${APP_NAME}" \
              environment=prod \
              location=centralindia \
              deployContainerApp=false \
              createRoleAssignments=false \
              mapplsRestKey="${MAPPLS_REST_KEY:-}" \
              mapplsClientId="${MAPPLS_CLIENT_ID:-}" \
              mapplsClientSecret="${MAPPLS_CLIENT_SECRET:-}" \
            --query "properties.outputs" -o json > /tmp/bicep-outputs.json

          ACR_NAME=$(python3 -c "import sys,json; print(json.load(sys.stdin)['acrName']['value'])" < /tmp/bicep-outputs.json)
          echo "acr_name=${ACR_NAME}" >> $GITHUB_OUTPUT
          echo "acr_server=${ACR_NAME}.azurecr.io" >> $GITHUB_OUTPUT
          echo "Deployed — ACR: ${ACR_NAME}"

      # ======================================================================
      # Build & ACR login
      # ======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: |
          set -euo pipefail

          ACR_NAME="${{ steps.infra-pre.outputs.acr_name }}"
          ACR_SERVER="${{ steps.infra-pre.outputs.acr_server }}"

          if [ -z "$ACR_NAME" ] && [ -n "$ACR_SERVER" ]; then
            ACR_NAME="${ACR_SERVER%%.*}"
          fi

          if [ -z "$ACR_NAME" ]; then
            echo "::error::ACR name not found. Diagnostic information follows."
            echo "steps.infra-pre.outputs.acr_name='${{ steps.infra-pre.outputs.acr_name }}'"
            echo "steps.infra-pre.outputs.acr_server='${{ steps.infra-pre.outputs.acr_server }}'"
            echo "Listing available ACRs (login may have failed):"
            az acr list --query "[].{name:name,loginServer:loginServer}" -o table || true
            echo "Ensure the Bicep deploy step succeeded and Azure login is valid."
            exit 1
          fi

          echo "Logging into ACR: $ACR_NAME"
          az acr login --name "$ACR_NAME"

      # ======================================================================
      # Build and push the runtime (all-in-one) image
      # ======================================================================
      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          target: runtime
          push: true
          tags: |
            ${{ steps.infra-pre.outputs.acr_server }}/gridlock:${{ env.IMAGE_TAG }}
            ${{ steps.infra-pre.outputs.acr_server }}/gridlock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # ======================================================================
      # Deploy to Container Apps (via Bicep)
      # ======================================================================
      - name: Deploy Container App
        id: infra-post
        run: |
          set -euo pipefail

          az deployment sub create \
            --name "gridlock-ci-post-${GITHUB_RUN_ID}" \
            --location centralindia \
            --template-file infra/main.bicep \
            --parameters \
              appName="${APP_NAME}" \
              environment=prod \
              location=centralindia \
              deployContainerApp=true \
              imageTag="${IMAGE_TAG}" \
              createRoleAssignments=false \
              mapplsRestKey="${MAPPLS_REST_KEY:-}" \
              mapplsClientId="${MAPPLS_CLIENT_ID:-}" \
              mapplsClientSecret="${MAPPLS_CLIENT_SECRET:-}"

      # ======================================================================
      # Health check
      # ======================================================================
      - name: Wait for deployment & health check
        run: |
          RG="rg-${APP_NAME}-${{ github.event.inputs.environment || 'prod' }}"
          ACA="ca-${APP_NAME}-${{ github.event.inputs.environment || 'prod' }}"

          echo "Waiting for Container App revision to activate..."
          sleep 15

          FQDN=$(az containerapp show -n "${ACA}" -g "${RG}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Health checking https://${FQDN}/api/health ..."
          for i in $(seq 1 20); do
            if curl -fsS "https://${FQDN}/api/health" >/dev/null 2>&1; then
              echo "✓ Health check passed (attempt ${i})"
              curl -s "https://${FQDN}/api/health" | python3 -m json.tool
              exit 0
            fi
            echo " ... waiting (attempt ${i}/20)"
            sleep 6
          done

          echo "✗ Health check failed after 20 attempts"
          # Dump container logs for debugging
          echo "=== Container App logs (last 50 lines) ==="
          az containerapp logs show -n "${ACA}" -g "${RG}" --tail 50 || true
          exit 1

      # ======================================================================
      # Summary
      # ======================================================================
      - name: Deployment summary
        if: always()
        run: |
          RG="rg-${APP_NAME}-${{ github.event.inputs.environment || 'prod' }}"
          ACA="ca-${APP_NAME}-${{ github.event.inputs.environment || 'prod' }}"
          FQDN=$(az containerapp show -n "${ACA}" -g "${RG}" \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "unknown")

          echo "=========================================="
          echo " GridLock — Azure Deployment Summary"
          echo "=========================================="
          echo " Image: ${{ steps.infra-pre.outputs.acr_server }}/gridlock:${{ env.IMAGE_TAG }}"
          echo " FQDN: https://${FQDN}"
          echo " Resource: ${RG}/${ACA}"
          echo " Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "=========================================="