name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx pydantic

      - name: Start backend in background
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m uvicorn api.main:app --host 127.0.0.1 --port 8765 --log-level info &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/api/health >/dev/null 2>&1; then
              echo "backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:8765/api/health; then
            echo "=== Backend failed to start. Diagnostics: ==="
            echo "--- Process check ---"
            ps aux | grep uvicorn || echo "uvicorn process not found"
            echo "--- Health endpoint response ---"
            curl -sv http://127.0.0.1:8765/api/health 2>&1 || true
            echo "backend never came up"
            exit 1
          fi

      - name: Run API contract test
        run: |
          python tests/test_api_contract.py --base http://127.0.0.1:8765

  build-image:
    runs-on: ubuntu-latest
    needs: contract-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the runtime image (sanity)
        run: |
          docker build --target runtime -t gridlock:test .
          docker run --rm gridlock:test ls -la /entrypoint.sh /etc/nginx/conf.d/gridlock.conf.template
