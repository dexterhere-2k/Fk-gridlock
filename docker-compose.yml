services:
  gridlock:
    build:
      context: .
      target: runtime
    image: gridlock:latest
    container_name: gridlock
    ports:
      - "8000:80"
    env_file:
      - .env
    environment:
      - PORT=80
      - PYTHONPATH=/app
      - GRIDLOCK_LOG_LEVEL=info
    volumes:
      - gridlock_artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 4s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gridlock_artifacts:
    name: gridlock_artifacts
